<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ears -->
  <polygon points="15,40 28,10 40,40" fill="#E8722A"/>
  <polygon points="60,40 72,10 85,40" fill="#E8722A"/>
  <polygon points="19,38 28,16 37,38" fill="#F4A26A"/>
  <polygon points="63,38 72,16 81,38" fill="#F4A26A"/>
  <!-- head -->
  <circle cx="50" cy="58" r="35" fill="#E8722A"/>
  <!-- stripes -->
  <line x1="50" y1="26" x2="50" y2="36" stroke="#C85A1A" stroke-width="3" stroke-linecap="round"/>
  <line x1="43" y1="28" x2="41" y2="38" stroke="#C85A1A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="57" y1="28" x2="59" y2="38" stroke="#C85A1A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="38" cy="55" rx="7" ry="8" fill="#2A1A00"/>
  <ellipse cx="62" cy="55" rx="7" ry="8" fill="#2A1A00"/>
  <circle cx="40" cy="53" r="2" fill="white"/>
  <circle cx="64" cy="53" r="2" fill="white"/>
  <!-- nose -->
  <polygon points="50,65 46,70 54,70" fill="#C85A8A"/>
  <!-- mouth -->
  <path d="M46,70 Q50,75 54,70" fill="none" stroke="#C85A8A" stroke-width="1.5"/>
  <!-- whiskers -->
  <line x1="15" y1="63" x2="40" y2="67" stroke="#C85A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="70" x2="40" y2="70" stroke="#C85A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="67" x2="85" y2="63" stroke="#C85A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="85" y2="70" stroke="#C85A1A" stroke-width="1.5" stroke-linecap="round"/>
</svg>
